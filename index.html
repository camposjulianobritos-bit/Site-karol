<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pra Karol ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: Arial;
}

.box {
    text-align: center;
}

button {
    padding: 20px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <button onclick="abrir()">Abrir 💌</button>

    <div id="carta" style="display:none; margin-top:20px;">
        <h1>Funcionou ✔</h1>
        <p>Se isso aparecer, seu site está ok.</p>
    </div>
</div>

<script>
function abrir() {
    document.getElementById("carta").style.display = "block";
}
</script>

</body>
</html>
